<style>
body {
    margin: 0;
    height: 100vh;
    background: url('https://wallpapercave.com/uwp/uwp4960818.jpeg') no-repeat center center/cover;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* Day text */
.day {
    position: absolute;
    top: 40px;
    width: 100%;
    text-align: center;
    font-size: 60px;
    letter-spacing: 10px;
    font-weight: bold;
}

/* Dock */
.dock {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.6);
    backdrop-filter: blur(10px);
    padding: 12px 20px;
    border-radius: 25px;
    display: flex;
    gap: 20px;
    z-index: 10;
}

/* App icons */
.app {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    cursor: pointer;
    transition: transform 0.2s;
}

.app:hover {
    transform: scale(1.15);
}

/* Library icon INSIDE dock (same as apps) */
.library-app {
    display: flex;
    justify-content: center;
    align-items: center;
}

.library-app img {
    width: 32px;
    height: 32px;
    filter: invert(1);
}

/* Clock */
.clock {
    position: absolute;
    right: 40px;
    bottom: 40px;
    background: rgba(20,20,20,0.6);
    padding: 15px 25px;
    border-radius: 20px;
    text-align: right;
    z-index: 10;
}

/* Fullscreen Library */
.library-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(18px);
    display: none;
    flex-direction: column;
    padding: 30px;
    z-index: 999;
}

.library-overlay.open {
    display: flex;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(20,20,20,0.8);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
}

#searchApps {
    width: 320px;
    max-width: 90%;
    margin: 60px auto 30px auto;
    padding: 14px 20px;
    border: none;
    border-radius: 25px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 18px;
    outline: none;
}

.library-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    padding: 20px;
    justify-content: flex-start;
}

.library-item {
    width: 80px;
    text-align: center;
    cursor: pointer;
}

.library-icon {
    width: 70px;
    height: 70px;
    border-radius: 18px;
    background-size: cover;
    background-position: center;
    transition: transform 0.2s;
    margin: auto;
}

.library-icon:hover {
    transform: scale(1.1);
}

.library-name {
    font-size: 12px;
    margin-top: 6px;
}
.settings-overlay{
    position:fixed;
    inset:0;
    display:none;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(15px);
    z-index:9999;
    align-items:center;
    justify-content:center;
}

.settings-overlay.open{
    display:flex;
}
</style>

<script>
function openApp(link) {
    window.open(link, "_blank");
}

function toggleLibrary() {
    document.getElementById("libraryOverlay").classList.toggle("open");
}

function searchApps() {
    let input = document.getElementById("searchApps").value.toLowerCase();
    let items = document.querySelectorAll(".library-item");

    items.forEach(item => {
        let name = (item.dataset.name || "").toLowerCase();
        item.style.display = name.includes(input) ? "block" : "none";
    });
}

function updateClock() {
    const now = new Date();

    let time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    let date = now.toLocaleDateString([], {month:'short', day:'numeric'});

    document.getElementById("clock").innerHTML = `
        ${time}<br>
        <span style="font-size:12px;">${date}</span>
    `;

    const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","TUFF DAY"];
    document.getElementById("dayText").textContent = days[now.getDay()];
}

setInterval(updateClock, 1000);
updateClock();
let panicKey = "`";

function toggleSettings(){
    document.getElementById("settingsOverlay").classList.toggle("open");
}

/* panic key */
document.addEventListener("keydown",(e)=>{
    if(e.key.toLowerCase() === panicKey){
        window.location.href = "https://centennial.schoology.com/home";
    }
});

/* background switch */
function setBG(el){
    document.body.style.backgroundImage = el.style.backgroundImage;
}
function toggleSettings() {
    const overlay = document.getElementById("settingsOverlay");

    if (overlay.style.display === "flex") {
        overlay.style.display = "none";
    } else {
        overlay.style.display = "flex";
    }
}
</script>
