<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunset OS</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: url('https://wallpapercave.com/uwp/uwp4960818.jpeg') no-repeat center center/cover;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* Day text */
.day {
    position: absolute;
    top: 40px;
    width: 100%;
    text-align: center;
    font-size: 60px;
    letter-spacing: 10px;
    font-weight: bold;
}

/* Dock */
.dock {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.6);
    backdrop-filter: blur(10px);
    padding: 12px 20px;
    border-radius: 25px;
    display: flex;
    gap: 20px;
    z-index: 10;
}

/* App icons */
.app {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    cursor: pointer;
    transition: transform 0.2s;
}

.app:hover {
    transform: scale(1.15);
}

/* Clock */
.clock {
    position: absolute;
    right: 40px;
    bottom: 40px;
    background: rgba(20,20,20,0.6);
    padding: 15px 25px;
    border-radius: 20px;
    text-align: right;
    z-index: 10;
}

/* Library Button */
.library-btn {
    position: absolute;
    left: 740px;
    bottom: 40px;
    width: 74px;
    height: 74px;
    border-radius: 20px;
    background: rgba(20,20,20,0.7);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: transform 0.2s;
    z-index: 10;
}

.library-btn:hover {
    transform: scale(1.1);
}

.library-btn img {
    width: 42px;
    height: 42px;
    object-fit: contain;
    filter: invert(1);
}

/* Fullscreen Library */
.library-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(18px);
    display: none;
    flex-direction: column;
    padding: 30px;
    z-index: 999;
}

.library-overlay.open {
    display: flex;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(20,20,20,0.8);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
}

#searchApps {
    width: 320px;
    max-width: 90%;
    margin: 60px auto 30px auto;
    padding: 14px 20px;
    border: none;
    border-radius: 25px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 18px;
    outline: none;
}

.library-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    padding: 20px;
    justify-content: flex-start;
}

.library-item {
    width: 80px;
    text-align: center;
    cursor: pointer;
}

.library-icon {
    width: 70px;
    height: 70px;
    border-radius: 18px;
    background-size: cover;
    background-position: center;
    transition: transform 0.2s;
    margin: auto;
}

.library-icon:hover {
    transform: scale(1.1);
}

.library-name {
    font-size: 12px;
    margin-top: 6px;
}
</style>
</head>
<body>

<div class="day" id="dayText">MONDAY</div>

<!-- Library button -->
<div class="library-btn" onclick="toggleLibrary()">
    <img src="https://static.thenounproject.com/png/5443009-200.png" alt="Library">
</div>

<!-- Fullscreen Library -->
<div class="library-overlay" id="libraryOverlay">
    <button class="close-btn" onclick="toggleLibrary()">Close</button>

    <input type="text" id="searchApps" placeholder="Search apps..." onkeyup="searchApps()">

    <div class="library-grid" id="libraryGrid">

        <!-- LIBRARY ONLY APPS -->

            <div class="library-name">Discord</div>
        </div>

        <div class="library-item" data-name="Kahoot" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://kahoot-bot.net/')">

            <div class="library-icon" style="background-image:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3w1PK7yW2YbG76OJw1XPe1ke99ucQ93B9nUmNEmXghYGKghLI4BpStc2Y7GPMkiE35ReSCkUnNO6E7FvwZIU-fDXpVk7OaeiJF6RhKDl05BIZf3qWdu8W-TLuWaaeHYk&amp')"></div>
            <div class="library-name">Vice City</div>
        </div>
                <div class="library-item" data-name="Xbox Cloud Gaming" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://www.xbox.com/en-us/play')">
            <div class="library-icon" style="background-image:url('https://play-lh.googleusercontent.com/hihXCV-0wxOXB5N7uBREaJeCVK0BDjNEBtKwNAncftZMflpEvasiKXn7vCKxu9qGpvk=w512-h512-rw')"></div>
            <div class="library-name">Xbox</div>

                <div class="library-item" data-name="Calculator" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://thisissonobodyplaysgame.github.io/calc/')">

<!-- Dock -->

    <div class="app" data-name="Netflix" data-icon="https://platform.theverge.com/wp-content/uploads/sites/2/chorus/uploads/chorus_asset/file/15844974/netflixlogo.0.0.1466448626.png?quality=90&strip=all&crop=1.2535702951444,0,97.492859409711,100" style="background-image:url('https://platform.theverge.com/wp-content/uploads/sites/2/chorus/uploads/chorus_asset/file/15844974/netflixlogo.0.0.1466448626.png?quality=90&strip=all&crop=1.2535702951444,0,97.492859409711,100')" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://learningaboutmvies.b-cdn.net/')"></div>

    <div class="app" data-name="Roblox" data-icon="https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Roblox_Corporation_2025_logo.svg/960px-Roblox_Corporation_2025_logo.svg.png" style="background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Roblox_Corporation_2025_logo.svg/960px-Roblox_Corporation_2025_logo.svg.png')" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://nowgg.fun%2Fapps%2Fa%2F19900%2Fb.html')"></div>

    <div class="app" data-name="PSify" data-icon="https://static0.thegamerimages.com/wordpress/wp-content/uploads/2020/01/Playstation-logo-1.jpg" style="background-image:url('https://static0.thegamerimages.com/wordpress/wp-content/uploads/2020/01/Playstation-logo-1.jpg')" onclick="openApp('https://thisissonobodyplaysgame.github.io/psify')"></div>
    
    <div class="app" data-name="GeForce" data-icon="https://play-lh.googleusercontent.com/_-b_HQXrVyyhZSHj_BoE9u_-cxkcHDH_yLX5rDjJsFMIfsCNQs9F3QP4JvEFcWaSIz0" style="background-image:url('https://play-lh.googleusercontent.com/_-b_HQXrVyyhZSHj_BoE9u_-cxkcHDH_yLX5rDjJsFMIfsCNQs9F3QP4JvEFcWaSIz0')" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://play.geforcenow.com')"></div>
        
    <div class="app" data-name="TikTok" data-icon="https://img.freepik.com/premium-vector/tik-tok-logo_578229-290.jpg?semt=ais_hybrid&w=740&q=80" style="background-image:url('https://img.freepik.com/premium-vector/tik-tok-logo_578229-290.jpg?semt=ais_hybrid&w=740&q=80')" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://tiktok.com/foryou')"></div>
        
    <div class="app" data-name="ChatGPT" data-icon="https://store-images.s-microsoft.com/image/apps.14785.14423064005243201.42399137-369b-40bb-b5be-ac2f079c41bf.b1d6d110-9d93-441f-ac20-2e04fd7dfe3c?h=210" style="background-image:url('https://store-images.s-microsoft.com/image/apps.14785.14423064005243201.42399137-369b-40bb-b5be-ac2f079c41bf.b1d6d110-9d93-441f-ac20-2e04fd7dfe3c?h=210')" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://chatgpt.com')"></div>

</div>

<div class="clock" id="clock"></div>

<script>
function openApp(link) {
    window.open(link, "_blank");
}

function toggleLibrary() {
    document.getElementById("libraryOverlay").classList.toggle("open");
}

function searchApps() {
    let input = document.getElementById("searchApps").value.toLowerCase();
    let items = document.querySelectorAll(".library-item");

    items.forEach(item => {
        let name = (item.dataset.name || "").toLowerCase();
        item.style.display = name.includes(input) ? "block" : "none";
    });
}

function populateLibrary() {
    const apps = document.querySelectorAll(".dock .app");
    const grid = document.getElementById("libraryGrid");

    apps.forEach(app => {
        const item = document.createElement("div");
        item.className = "library-item";
        item.dataset.name = app.dataset.name;

        item.innerHTML = `
            <div class="library-icon" style="background-image:url('${app.dataset.icon}')"></div>
            <div class="library-name">${app.dataset.name}</div>
        `;

        item.onclick = () => app.click();

        grid.insertBefore(item, grid.firstChild);
    });
}

/* Clock + date */
function updateClock() {
    const now = new Date();

    let time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    let date = now.toLocaleDateString([], {month:'short', day:'numeric'});

    document.getElementById("clock").innerHTML = `
        ${time}<br>
        <span style="font-size:12px;">${date}</span>
    `;

    const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","TUFF DAY"];
    document.getElementById("dayText").textContent = days[now.getDay()];
}

populateLibrary();
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
