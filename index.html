<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunset OS</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: url('https://4kwallpapers.com/images/walls/thumbs_3t/22922.jpg') no-repeat center center/cover;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* Day text */
.day {
    position: absolute;
    top: 40px;
    width: 100%;
    text-align: center;
    font-size: 60px;
    letter-spacing: 10px;
    font-weight: bold;
}

/* Dock */
.dock {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.6);
    backdrop-filter: blur(10px);
    padding: 12px 20px;
    border-radius: 25px;
    display: flex;
    gap: 20px;
}

/* App icons */
.app {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    cursor: pointer;
    transition: transform 0.2s;
}

.app:hover {
    transform: scale(1.15);
}

/* Clock box */
.clock {
    position: absolute;
    right: 40px;
    bottom: 40px;
    background: rgba(20,20,20,0.6);
    padding: 15px 25px;
    border-radius: 20px;
    text-align: right;
}

</style>
</head>

<body>

<div class="day" id="dayText">MONDAY</div>

<div class="dock">

    <!-- APP TEMPLATE (copy this to add more apps) -->
    <div class="app" style="background-image:url('https://platform.theverge.com/wp-content/uploads/sites/2/chorus/uploads/chorus_asset/file/15844974/netflixlogo.0.0.1466448626.png?quality=90&strip=all&crop=1.2535702951444,0,97.492859409711,100')" onclick="openApp('https://learningaboutsunshines.b-cdn.net/')"></div>

    <div class="app" style="background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Roblox_Corporation_2025_logo.svg/960px-Roblox_Corporation_2025_logo.svg.png')" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://nowgg.fun%2Fapps%2Fa%2F19900%2Fb.html')"></div>

    <div class="app" style="background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Spotify_App_Logo.svg/500px-Spotify_App_Logo.svg.png?_=20210620075506')" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://music.youtube.com/?hl=en')"></div>
    
                    <div class="app" style="background-image:url('https://static0.thegamerimages.com/wordpress/wp-content/uploads/2020/01/Playstation-logo-1.jpg')" onclick="openApp('https://thisissonobodyplaysgame.github.io/psify')"></div>
    
        <div class="app" style="background-image:url('https://play-lh.googleusercontent.com/_-b_HQXrVyyhZSHj_BoE9u_-cxkcHDH_yLX5rDjJsFMIfsCNQs9F3QP4JvEFcWaSIz0')" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://play.geforcenow.com')"></div>
        
                        <div class="app" style="background-image:url('https://img.freepik.com/premium-vector/tik-tok-logo_578229-290.jpg?semt=ais_hybrid&w=740&q=80')" onclick="openApp('https://learningaboutschoolwork.b-cdn.net/embed.html?url=https://tiktok.com/foryou')"></div>
        
                <div class="app" style="background-image:url('https://theoretical-amber-feokxpxuh3.edgeone.app/ChatGPT%20Image%20Apr%2020,%202026,%2009_50_57%20PM.png')" onclick="openApp('https://learningaboutblooks.b-cdn.net')"></div>

</div>

<div class="clock" id="clock"></div>

<script>

/* Open apps in new tab */
function openApp(link) {
    window.open(link, "_blank");
}

/* Clock + date */
function updateClock() {
    const now = new Date();

    let time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    let date = now.toLocaleDateString([], {month:'short', day:'numeric'});

    document.getElementById("clock").innerHTML = `
        ${time}<br>
        <span style="font-size:12px;">${date}</span>
    `;

    /* Day text */
    const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
    document.getElementById("dayText").textContent = days[now.getDay()];
}

setInterval(updateClock, 1000);
updateClock();

</script>

</body>
</html>
